<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eremotherium RA - WebXR</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: sans-serif;
        }
        model-viewer {
            width: 100%;
            height: 100%;
            border: none;
        }
        .instructions {
            position: absolute;
            bottom: 30px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #4CAF50;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 100;
            border: 1px solid #4CAF50;
            pointer-events: none;
        }
        model-viewer:not([ar-status="not-present"]) #ar-button {
            display: block;
        }
        model-viewer[ar-status="not-present"] #ar-button {
            display: none;
        }
        @media (max-width: 768px) {
            .instructions { display: none; }
        }
    </style>
</head>
<body>
    <div class="instructions">
        🦥 Ref: 🖱️ Arrastra para rotar | Rueda para zoom
    </div>

    <model-viewer
        id="modelo"
        src="Eremotheriumlasalle.glb"
        alt="Eremotherium - Modelo Fósil"
        ar
        ar-modes="webxr"
        ios-src="Eremotheriumlasalle.usdz"
        ar-placement="floor"
        ar-scale="fixed"
        camera-controls
        auto-rotate
        shadow-intensity="1.5"
        exposure="1"
        environment-image="neutral"
        style="background-color: #222;">
        
        <button slot="ar-button" id="ar-button" style="position: absolute; bottom: 30px; right: 20px; background: #4CAF50; color: white; padding: 15px 30px; border-radius: 50px; border: none; font-size: 18px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); cursor: pointer; z-index: 100;">
            📱 VER EN REALIDAD AUMENTADA
        </button>
    </model-viewer>

    <script>
        const modelViewer = document.getElementById('modelo');
        
        modelViewer.addEventListener('load', () => {
            // Escala para vista en pantalla
            modelViewer.scale = '3 3 3';
        });
        
        modelViewer.addEventListener('ar-status-updated', (event) => {
            if (event.detail.status === 'session-started') {
                setTimeout(() => {
                    const model = modelViewer.model;
                    if (model) {
                        model.scale.set(4, 4, 4);
                    }
                }, 500);
            }
        });
    </script>
</body>
</html>
